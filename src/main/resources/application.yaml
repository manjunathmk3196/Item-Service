spring:
  application:
    name: Item-Service
  mongodb:
    database: itemdb
    host: localhost
    port: 27017

server:
  port: 8081

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
